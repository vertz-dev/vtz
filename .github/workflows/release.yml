name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-arm64
            expected_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-x64
            expected_arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            pkg: runtime-linux-x64
            expected_arch: x86_64
          # linux-arm64 now available (ubuntu-24.04-arm, free for public repos)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            pkg: runtime-linux-arm64
            expected_arch: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        run: |
          if [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          # Include version in cache key so env-dependent builds are never stale
          key: v${{ steps.version.outputs.version }}

      - name: Build runtime binary
        working-directory: native
        env:
          VERTZ_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package directory
        run: |
          cp native/target/${{ matrix.target }}/release/vtz npm/${{ matrix.pkg }}/vtz
          chmod +x npm/${{ matrix.pkg }}/vtz

      - name: Verify binary version matches version.txt
        run: |
          EXPECTED="vtz ${{ steps.version.outputs.version }}"
          if [ "$(uname -m)" = "${{ matrix.expected_arch }}" ]; then
            ACTUAL=$(npm/${{ matrix.pkg }}/vtz --version 2>&1)
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Binary version mismatch! Expected '$EXPECTED' but got '$ACTUAL'"
              exit 1
            fi
          else
            echo "Cross-compiled binary, skipping runtime version check"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: npm/${{ matrix.pkg }}/vtz
          retention-days: 1

  release:
    name: Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-arm64
          path: npm/runtime-darwin-arm64/
        continue-on-error: true

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-x64
          path: npm/runtime-darwin-x64/
        continue-on-error: true

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: npm/runtime-linux-x64/
        continue-on-error: true

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-arm64
          path: npm/runtime-linux-arm64/
        continue-on-error: true

      - name: Make binaries executable
        run: |
          for dir in npm/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              chmod +x "${dir}vtz"
              echo "Binary found: ${dir}vtz"
            fi
          done

      - name: Build runtime selector package
        working-directory: npm/runtime
        run: bun build index.ts --outdir . --target node

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bash scripts/publish.sh
          version: bash scripts/version.sh
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat version.txt)
          TAG="v${VERSION}"
          ASSETS=()
          for dir in npm/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              pkg=$(basename "$dir")
              platform="${pkg#runtime-}"
              cp "${dir}vtz" "vtz-${platform}"
              ASSETS+=("vtz-${platform}")
            fi
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No binaries found, skipping release"
            exit 0
          fi

          if gh release view "$TAG" &>/dev/null; then
            # Release exists — delete old binary assets and upload fresh ones
            echo "Release $TAG exists, replacing binary assets..."
            for asset in "${ASSETS[@]}"; do
              gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
            done
            gh release upload "$TAG" "${ASSETS[@]}"
          else
            # First release for this version — create it
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
