name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0). If empty, reads from version.txt'
        required: false
        type: string

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-arm64
            expected_arch: arm64
          # darwin-x64 deferred (V8 cross-compile issue)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            pkg: runtime-linux-x64
            expected_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            pkg: runtime-linux-arm64
            expected_arch: aarch64
          # linux-arm64 now available (ubuntu-24.04-arm, free for public repos)

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify runner architecture
        run: |
          ACTUAL=$(uname -m)
          if [ "$ACTUAL" != "${{ matrix.expected_arch }}" ]; then
            echo "::error::Expected architecture ${{ matrix.expected_arch }} but got $ACTUAL"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build runtime binary
        working-directory: native
        env:
          VERTZ_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package directory
        run: |
          cp native/target/${{ matrix.target }}/release/vtz npm/${{ matrix.pkg }}/vtz
          chmod +x npm/${{ matrix.pkg }}/vtz

      - name: Verify binary
        run: |
          if [ "$(uname -m)" = "${{ matrix.expected_arch }}" ]; then
            npm/${{ matrix.pkg }}/vtz --version
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: npm/${{ matrix.pkg }}/vtz
          retention-days: 1

  publish:
    name: Publish
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-arm64
          path: npm/runtime-darwin-arm64/
        continue-on-error: true

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: npm/runtime-linux-x64/
        continue-on-error: true

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-arm64
          path: npm/runtime-linux-arm64/
        continue-on-error: true

      - name: Make binaries executable
        run: |
          for dir in npm/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              chmod +x "${dir}vtz"
              echo "Binary found: ${dir}vtz"
            fi
          done

      - name: Stamp version into package.json files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg_json in npm/*/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg_json" > "$pkg_json.tmp" && mv "$pkg_json.tmp" "$pkg_json"
          done
          # Update optionalDependencies versions in the selector package
          jq --arg v "$VERSION" '.optionalDependencies |= with_entries(.value = $v)' npm/runtime/package.json > npm/runtime/package.json.tmp && mv npm/runtime/package.json.tmp npm/runtime/package.json

      - name: Build runtime selector package
        working-directory: npm/runtime
        run: bun build index.ts --outdir . --target node

      - name: Publish platform packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          FAILED=()
          MODIFIED_PKGS=()

          cleanup_private() {
            for pkg_json in "${MODIFIED_PKGS[@]}"; do
              if [ -f "$pkg_json" ]; then
                jq '. + {"private": true}' "$pkg_json" > "$pkg_json.tmp" && mv "$pkg_json.tmp" "$pkg_json"
              fi
            done
          }
          trap cleanup_private EXIT

          is_published() {
            local name=$1 version=$2
            local published
            published=$(npm view "$name@$version" version 2>/dev/null || echo "")
            [ "$published" = "$version" ]
          }

          # Platform packages first
          for pkg_json in npm/runtime-*/package.json; do
            [ -f "$pkg_json" ] || continue
            dir=$(dirname "$pkg_json")
            name=$(jq -r '.name' "$pkg_json")
            version=$(jq -r '.version' "$pkg_json")

            if [ ! -f "$dir/vtz" ]; then
              echo "⏭️  Skipping $name (no binary)"
              continue
            fi

            # Temporarily remove private flag
            jq 'del(.private)' "$pkg_json" > "$pkg_json.tmp" && mv "$pkg_json.tmp" "$pkg_json"
            MODIFIED_PKGS+=("$pkg_json")

            if is_published "$name" "$version"; then
              echo "⏭️  Skipping $name@$version (already published)"
              continue
            fi

            echo "📦 Publishing $name@$version..."
            if (cd "$dir" && npm publish --access public --provenance); then
              echo "✅ Published $name@$version"
            else
              echo "❌ Failed to publish $name@$version"
              FAILED+=("$name@$version")
            fi
          done

          # Then the selector package
          name=$(jq -r '.name' npm/runtime/package.json)
          version=$(jq -r '.version' npm/runtime/package.json)
          if is_published "$name" "$version"; then
            echo "⏭️  Skipping $name@$version (already published)"
          else
            echo "📦 Publishing $name@$version..."
            if (cd npm/runtime && npm publish --access public --provenance); then
              echo "✅ Published $name@$version"
            else
              echo "❌ Failed to publish $name@$version"
              FAILED+=("$name@$version")
            fi
          fi

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "❌ Failed to publish: ${FAILED[*]}"
            exit 1
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Collect binaries for release assets
          ASSETS=()
          for dir in npm/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              pkg=$(basename "$dir")
              platform="${pkg#runtime-}"
              cp "${dir}vtz" "vtz-${platform}"
              ASSETS+=("vtz-${platform}")
            fi
          done

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "${ASSETS[@]}"
